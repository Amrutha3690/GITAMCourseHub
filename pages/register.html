<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration | GITAM CourseHub</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="auth-container">

<!-- LEFT PANEL -->

<div class="left-panel">

<img src="../images/login.jpg" alt="Register Illustration">

</div>

<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="form-box">

<center>

<img src="../images/logo.png" class="logo">

</center>

<h2>Student Registration</h2>

<form>

<div class="form-group">

<label>Full Name</label>

<input
type="text"
placeholder="Enter Full Name"
required>

</div>

<div class="form-group">

<label>Registration Number</label>

<input
type="text"
placeholder="2024XXXXXXXX"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
placeholder="student@gitam.in"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
placeholder="Create Password"
required>

</div>

<div class="form-group">

<label>Department</label>

<select>

<option>CSE</option>

<option>CSE (Data Science)</option>

<option>CSE (AI & ML)</option>

<option>ECE</option>

<option>EEE</option>

<option>Mechanical</option>

<option>Civil</option>

</select>

</div>

<div class="form-group">

<label>Year of Study</label>

<select>

<option>1st Year</option>

<option>2nd Year</option>

<option selected>3rd Year</option>

<option>4th Year</option>

</select>

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
placeholder="Confirm Password"
required>

</div>

<div class="form-group">

<label>Gender</label>

<select>

<option>Female</option>

<option>Male</option>

<option>Other</option>

</select>

</div>

<div class="form-group">

<label>Skills</label>

<div style="display:flex;flex-wrap:wrap;gap:15px;">

<label><input type="checkbox"> Java</label>

<label><input type="checkbox"> Python</label>

<label><input type="checkbox"> SQL</label>

<label><input type="checkbox"> HTML</label>

<label><input type="checkbox"> CSS</label>

<label><input type="checkbox"> JavaScript</label>

</div>

</div>

<div class="form-group">

<label>

<input type="checkbox" required>

I agree to the Terms & Conditions

</label>

</div>

<button type="submit">

Register

</button>

<div class="form-footer">

Already have an account?

<a href="login.html">

Login Here

</a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
