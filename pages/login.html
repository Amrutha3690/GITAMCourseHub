<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | GITAM CourseHub</title>

<link rel="stylesheet"
href="../css/style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="auth-container">

<!-- LEFT -->

<div class="left-panel">

<img src="../images/login.jpg"
alt="Login">

</div>

<!-- RIGHT -->

<div class="right-panel">

<div class="form-box">

<center>

<img src="../images/logo.png"
class="logo">

</center>

<h2>

Student Login

</h2>

<form>

<div class="form-group">

<label>

Email

</label>

<input
type="email"
placeholder="student@gitam.in"
required>

</div>

<div class="form-group">

<label>

Password

</label>

<input
type="password"
placeholder="Enter Password"
required>

</div>

<div style="display:flex;
justify-content:space-between;
margin-bottom:20px;">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>
<button type="submit">

Login

</button>

<div class="form-footer">

<p>

Don't have an account?

<a href="register.html">

Register Here

</a>

</p>

</div>

<hr style="margin:25px 0;">

<center>

<h3 style="color:#1976D2;">

Demo Credentials

</h3>

<p>

<b>Email:</b> student@gitam.in

</p>

<p>

<b>Password:</b> student123

</p>

</center>

</form>

</div>

</div>

</div>

</body>

</html>
